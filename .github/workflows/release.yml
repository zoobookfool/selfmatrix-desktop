name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest
    env:
      NODE_VERSION: "24"

    steps:
      - name: Checkout selfmatrix-desktop
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: selfmatrix-desktop
          persist-credentials: false

      - name: Validate tag and load immutable product lock
        working-directory: selfmatrix-desktop
        run: node scripts/release-inputs.cjs --tag "$env:GITHUB_REF_NAME" --write-env "$env:GITHUB_ENV"

      - name: Checkout cinny
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ env.CINNY_REPOSITORY }}
          ref: ${{ env.CINNY_REF }}
          path: cinny
          persist-credentials: false

      - name: Checkout element-call
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ env.ELEMENT_CALL_REPOSITORY }}
          ref: ${{ env.ELEMENT_CALL_REF }}
          path: element-call
          persist-credentials: false

      - name: Verify checked out product inputs
        working-directory: selfmatrix-desktop
        run: node scripts/release-inputs.cjs --verify-siblings

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm via Corepack
        run: |
          $corepackBin = Join-Path $env:RUNNER_TEMP "corepack-bin"
          New-Item -ItemType Directory -Force -Path $corepackBin | Out-Null
          corepack enable --install-directory $corepackBin
          $corepackBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure element-call script shell
        working-directory: element-call
        run: pnpm config set scriptShell "C:\\Program Files\\Git\\bin\\bash.exe"

      - name: Install and verify element-call
        working-directory: element-call
        shell: bash
        run: |
          pnpm install --frozen-lockfile --ignore-pnpmfile
          pnpm lint
          pnpm test:unit -- --run
          pnpm audit --prod
          pnpm build:embedded
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Install and verify cinny web/native builds
        working-directory: cinny
        shell: bash
        run: |
          npm ci
          npm run typecheck
          npm run check:eslint
          npm audit --omit=dev
          npm run build
          node .selfmatrix/check-web-no-native.mjs dist
          npm run build:native
          node .selfmatrix/check-web-no-native.mjs dist --expect-fail
        env:
          VITE_SELFMATRIX_DESKTOP_VERSION: ${{ env.DESKTOP_VERSION }}
          VITE_SELFMATRIX_CINNY_SHA: ${{ env.CINNY_REF }}
          VITE_SELFMATRIX_ELEMENT_CALL_SHA: ${{ env.ELEMENT_CALL_REF }}

      - name: Install and test desktop
        working-directory: selfmatrix-desktop
        run: |
          npm ci
          npm audit --omit=dev
          npm test

      - name: Build NSIS installer
        working-directory: selfmatrix-desktop
        run: npx electron-builder --win nsis --publish never

      - name: Verify updater in packaged application
        working-directory: selfmatrix-desktop
        run: node src/run-packaged-update-download-probe.cjs

      - name: Write build manifest
        working-directory: selfmatrix-desktop
        run: node scripts/release-inputs.cjs --write-manifest dist/BUILD-MANIFEST.json

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            selfmatrix-desktop/dist/*.exe
            selfmatrix-desktop/dist/BUILD-MANIFEST.json

      - name: Generate SHA256SUMS
        working-directory: selfmatrix-desktop/dist
        shell: bash
        run: |
          sha256sum SelfMatrix-Setup-*.exe SelfMatrix-Setup-*.exe.blockmap latest.yml BUILD-MANIFEST.json > SHA256SUMS
          cat SHA256SUMS

      - name: Create draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            selfmatrix-desktop/dist/SelfMatrix-Setup-*.exe
            selfmatrix-desktop/dist/SelfMatrix-Setup-*.exe.blockmap
            selfmatrix-desktop/dist/latest.yml
            selfmatrix-desktop/dist/BUILD-MANIFEST.json
            selfmatrix-desktop/dist/SHA256SUMS

# The workflow intentionally stops at a draft. Before publishing, the operator must sign the
# installer offline and attach `<installer>.minisig`. The application downloads that exact sidecar
# and refuses missing or invalid signatures; publishing without it would make the update unusable.
